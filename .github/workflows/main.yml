name: Build Android APK (Final)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4

    - name: ☕ Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 🐘 Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: 🛠️ Perbaiki Gradle Wrapper Otomatis
      run: gradle wrapper

    - name: 🔑 Berikan izin eksekusi
      run: chmod +x gradlew

    - name: 🔐 Buat Keystore Debug
      # Membuat sertifikat digital otomatis agar APK bisa di-build
      run: keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"

    - name: 🚀 Build APK (Debug)
      run: ./gradlew assembleDebug

    - name: 📦 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Aplikasi-Idadiyah-Mobile
        path: app/build/outputs/apk/debug/*.apk
