name: Build Android APK (Anti-Error)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4

    - name: ☕ Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 🐘 Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: 🛠️ Perbaiki Gradle Wrapper Otomatis
      # Trik Ampuh: Ini akan menimpa/membuat ulang file .jar yang rusak dengan yang baru & sehat langsung di server!
      run: gradle wrapper

    - name: 🔑 Berikan izin eksekusi
      run: chmod +x gradlew

    - name: 🚀 Build APK (Debug)
      run: ./gradlew assembleDebug

    - name: 📦 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: aplikasi-android-debug
        path: app/build/outputs/apk/debug/*.apk
